settings:
  title: 'Tiny Status Page'
  url: 'https://status.tinyforest.rocks' # used for Slack messages
  logo: logo-192x192.png # image in ./public/ folder
  daysInHistogram: 90 # number of days you want to display in histogram
  collectResponseTimes: true # collects avg response times from CRON locations

  allmonitorsOperational: 'All Systems Operational'
  notAllmonitorsOperational: 'Not All Systems Operational'
  monitorLabelOperational: 'Operational'
  monitorLabelNotOperational: 'Not Operational'
  monitorLabelNoData: 'No data'
  dayInHistogramNoData: 'No data'
  dayInHistogramOperational: 'All good'
  dayInHistogramNotOperational: ' incident(s)' # xx incident(s) recorded

monitors:
  - id: plex-tinyforest-rocks
    name: The Tiny Plex
    description: 'Plex will be down on Sunday the 28th @ 11am till 4pm for updates. This message will change once finished.' # default=empty
    url: 'https://plex.tinyforest.rocks/web/index.html#!/'
    method: GET
    expectStatus: 200
    linkable: true # allows the title to be a link, default=true
    
  - id: request-tinyforest-rocks
    name: The Request System
    description: 'Request will be down on Sunday the 28th @ 11am till 4pm for updates. This message will change once finished.' # default=empty
    url: 'https://request.tinyforest.rocks/login'
    method: GET
    expectStatus: 200
    linkable: true # allows the title to be a link, default=true

  - id: mc-tinyforest-rocks
    name: TinyCraft in Space
    description: 'The Minecraft server will be down on Sunday the 28th @ 11am till 4pm for updates. This message will change once finished.' # default=empty
    url: 'http://mc.tinyforest.rocks/'
    method: GET
    expectStatus: 200
    linkable: false # allows the title to be a link, default=true
